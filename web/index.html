<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport"
        content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Kemetic Calendar">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kemetic Calendar">
  <meta name="theme-color" content="#000000">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Kemetic Calendar</title>

  <style>
    /* Keep it minimal and safe */
    html, body {
      margin: 0;
      height: 100%;
      background-color: #000000;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* Pin Flutter surface to the viewport; let the engine size it (avoids iPad hit-test drift). */
    #flt-glass-pane, .flt-glass-pane, canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      touch-action: manipulation;
      pointer-events: auto;
      z-index: 1;
    }

    /* Do NOT fix the body or hide overflow; that causes iOS PWA desyncs */
    /* Removed:
       @supports (-webkit-touch-callout: none) { body { position: fixed; width:100%; height:100%; overflow:hidden; } }
    */

    /* Optional: interactive elements—fine to keep */
    button, [role="button"], a, input, textarea, select {
      touch-action: manipulation !important;
    }
  </style>

  <script>
    (function () {
      if (!('serviceWorker' in navigator) || !('caches' in window)) {
        window.__kemeticPwaBootstrapReady = Promise.resolve(false);
        return;
      }

      const reloadKey = 'kemetic.pwa.rootSwReset.v1';
      const flutterCacheNames = [
        'flutter-app-manifest',
        'flutter-temp-cache',
        'flutter-app-cache',
      ];

      async function clearStaleFlutterCaching() {
        try {
          const registrations = await navigator.serviceWorker.getRegistrations();
          let removedRootFlutterWorker = false;

          for (const registration of registrations) {
            const scriptUrls = [
              registration.active?.scriptURL,
              registration.waiting?.scriptURL,
              registration.installing?.scriptURL,
            ].filter(Boolean);

            const isFlutterAppShellWorker = scriptUrls.some((url) =>
              url.includes('/flutter_service_worker.js'),
            );
            if (!isFlutterAppShellWorker) {
              continue;
            }

            await registration.unregister();
            removedRootFlutterWorker = true;
          }

          await Promise.all(
            flutterCacheNames.map((name) => caches.delete(name).catch(() => false)),
          );

          if (
            removedRootFlutterWorker &&
            sessionStorage.getItem(reloadKey) !== '1'
          ) {
            sessionStorage.setItem(reloadKey, '1');
            const nextUrl = new URL(window.location.href);
            nextUrl.searchParams.set('_sw_reset', Date.now().toString());
            window.location.replace(nextUrl.toString());
            return true;
          }

          sessionStorage.removeItem(reloadKey);
          return false;
        } catch (error) {
          console.warn('[pwa] stale flutter service worker cleanup failed', error);
          return false;
        }
      }

      window.__kemeticPwaBootstrapReady = clearStaleFlutterCaching();
    })();
  </script>
  <script>
    // iOS PWA: gently "nudge" layout like a fake rotate to ensure correct glass-pane metrics
    (function () {
      const isIOS = /iphone|ipod|ipad/i.test(navigator.userAgent);
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || (window.navigator.standalone === true);

      function nudge() {
        if (!isIOS || !isStandalone) return;

        // Force a synchronous layout read before resize events.
        document.documentElement.getBoundingClientRect();

        // trigger layout + two resizes
        window.scrollTo(0, 1);
        requestAnimationFrame(() => {
          window.dispatchEvent(new Event('resize'));
          setTimeout(() => window.dispatchEvent(new Event('resize')), 60);
          setTimeout(() => window.dispatchEvent(new Event('resize')), 220);
        });
      }

      window.addEventListener('load', () => {
        nudge();
        setTimeout(nudge, 300);
      }, { once: true });

      window.addEventListener('pageshow', () => {
        nudge();
        setTimeout(nudge, 120);
      }, { passive: true });

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          nudge();
        }
      }, { passive: true });

      window.addEventListener('focus', () => {
        nudge();
      }, { passive: true });

      window.addEventListener('orientationchange', () => {
        nudge();
        setTimeout(nudge, 220);
      }, { passive: true });

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
          nudge();
        }, { passive: true });
      }
    })();
  </script>
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;

      function registerFirebaseMessagingWorker() {
        const workerUrl = new URL('firebase-messaging-sw.js', document.baseURI).toString();
        const scopePath = new URL('firebase-cloud-messaging-push-scope', document.baseURI).pathname;

        navigator.serviceWorker
          .register(workerUrl, { scope: scopePath })
          .catch((error) => {
            console.warn('[push] firebase-messaging-sw registration failed', error);
          });
      }

      window.addEventListener('load', registerFirebaseMessagingWorker, { once: true });
    })();
  </script>
</head>
<body>
<script>
  // 👇 request persistent storage on Safari
  if (navigator.storage && navigator.storage.persist) {
    navigator.storage.persist().then(function (granted) {
      console.log('Persistent storage granted:', granted);
    });
  }

</script>
<script src="install.js" defer></script>
<script>
  // Cache-bust the bootstrap script to avoid stale service worker bundles after deploys
  (async function () {
    try {
      const redirectedForCleanup = await (window.__kemeticPwaBootstrapReady || Promise.resolve(false));
      if (redirectedForCleanup) {
        return;
      }
    } catch (_) {
      // Best effort only; continue with app bootstrap.
    }

    const cacheBuster = Date.now().toString();
    const s = document.createElement('script');
    s.src = 'flutter_bootstrap.js?v=' + cacheBuster;
    s.async = true;
    document.body.appendChild(s);
  })();
</script>
</body>
</html>
